scan:
  exclude:
    - "vendor/"
    # CI workflows: pinned commit SHAs + GITHUB_TOKEN refs look like secrets
    # to entropy rules (workflow security is a separate tool's concern).
    - ".github/workflows/*.yml"
    # Docs: example snippets / placeholder tokens.
    - "README.md"
    - "CHANGELOG.md"
    - "docs/*.md"
    - "**/README.md"
    # Baseline file is itself a list of finding fingerprints (hashes).
    - ".nox/baseline.json"
    - "benchmarks/"
    - "examples/"
    - ".relicta/"
    - ".cover/"
    - ".nox/"
    - ".roady/"
    - ".git/"
    - "findings.json"
    - "go.sum"
    - "**/go.sum"

  rules:
    disable: []

    severity_override: {}

output:
  format: json
  directory: .

policy:
  fail_on: high
  warn_on: medium

# Activate nox code-level taint SAST (source-to-sink: SSRF, injection,
# path traversal). nox scan auto-installs (cosign-verified) + runs it.
plugins:
  required:
    - nox/taint-analysis
