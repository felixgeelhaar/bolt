scan:
  exclude:
    - "vendor/"
    - "benchmarks/"
    - "examples/"
    - ".relicta/"
    - ".cover/"
    - ".nox/"
    - ".roady/"
    - ".git/"
    - "findings.json"
    - "go.sum"
    - "**/go.sum"

  rules:
    disable: []

    severity_override: {}

output:
  format: json
  directory: .

policy:
  fail_on: high
  warn_on: medium
