name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Validate PR title
      uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          chore
          ci
          build
        requireScope: false
        subjectPattern: ^(?![A-Z]).+$
        subjectPatternError: |
          The subject "{subject}" found in the pull request title "{title}"
          didn't match the configured pattern. Please ensure that the subject
          doesn't start with an uppercase character.

  check-fork:
    # Skip for dependabot and the repo owner. External contributors must use
    # a fork per CONTRIBUTING.md; the solo-maintainer workflow pushes feature
    # branches directly to the main repo.
    if: github.actor != 'dependabot[bot]' && github.actor != github.repository_owner
    runs-on: ubuntu-latest
    steps:
    - name: Check if PR is from fork
      run: |
        if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          echo "✅ Pull request is from a fork - following contribution guidelines"
        else
          echo "❌ Pull request is from main repository - please use a fork"
          echo "See CONTRIBUTING.md for fork workflow instructions"
          exit 1
        fi

  performance-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest
      env:
        GOTOOLCHAIN: auto

    - name: Run baseline benchmarks (base branch)
      run: |
        git fetch origin ${{ github.base_ref }}
        git checkout ${{ github.base_ref }}
        # 6 iterations gives benchstat enough samples for the U-test to
        # produce meaningful p-values without blowing the CI budget.
        go test -run=^$ -bench=. -benchmem -count=5 -tags=bench \
          -benchtime=500ms > baseline.txt 2>&1 || (cat baseline.txt; exit 1)

    - name: Run PR benchmarks
      run: |
        git checkout ${{ github.head_ref }}
        go test -run=^$ -bench=. -benchmem -count=5 -tags=bench \
          -benchtime=500ms > pr.txt 2>&1 || (cat pr.txt; exit 1)

    - name: Compare with benchstat (Mann–Whitney U-test, alpha=0.05)
      id: compare
      run: |
        # -delta-test=utest: statistical significance test instead of raw means.
        # Output goes to BOTH the step summary (always) and a file we post as a
        # PR comment so reviewers don't have to dig through the Actions UI.
        benchstat -delta-test=utest baseline.txt pr.txt > delta.txt 2>&1 || true
        echo "## Benchmark comparison (benchstat, U-test)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat delta.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Post benchstat comment on PR
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@d2ad0de260ae8b0235ce059e63f2949ba9e05943 # v2.9.4
      with:
        header: benchstat
        path: delta.txt
        recreate: true

    - name: Gate on statistically significant regression
      run: |
        # Fail the job only when the U-test reports a delta with p < 0.05
        # AND the change is a regression (positive % delta). Insignificant
        # noise is ignored. This stops CI from chasing flaky 1-2 ns bumps
        # but still catches real regressions.
        if grep -E '\+[0-9]+(\.[0-9]+)?%\s+\(p=0\.0[0-4]' delta.txt; then
          echo "::error::Statistically significant performance regression detected (see benchstat output above)"
          exit 1
        fi
        echo "::notice::No statistically significant regression."

  allocation-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25'

    - name: Check zero allocations
      run: |
        echo "🔍 Checking for zero allocations in core paths..."

        # Run benchmarks and check for allocations
        if RESULT=$(go test -bench=BenchmarkZeroAllocation -benchmem 2>&1); then
          echo "$RESULT"
          # Check if main benchmark has 0 allocations
          if echo "$RESULT" | grep -q "0 allocs/op"; then
            echo "✅ Zero allocations maintained for core logging"
          else
            echo "❌ Allocations detected in core logging path"
            echo "This is a critical performance regression!"
            exit 1
          fi
        else
          echo "⚠️ Could not run allocation check, skipping"
        fi
