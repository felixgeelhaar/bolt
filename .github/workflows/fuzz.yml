name: Fuzz Testing

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fuzz-target:
          - FuzzJSONHandler
          - FuzzInputValidation
          - FuzzFloatFormatting
          - FuzzBufferManagement
          - FuzzConcurrentLogging
          - FuzzKeyValidation
          - FuzzUnicodeHandling
          - FuzzMessageEscaping
          - FuzzLevelValidation

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'

    - name: Run fuzz test (${{ matrix.fuzz-target }})
      run: go test -run=^$ -fuzz=${{ matrix.fuzz-target }} -fuzztime=120s .

    - name: Upload fuzz corpus
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-corpus-${{ matrix.fuzz-target }}
        path: testdata/fuzz/
        retention-days: 90
        if-no-files-found: ignore
