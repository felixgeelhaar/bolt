name: Fuzz Testing

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fuzz-target:
          - FuzzJSONHandler
          - FuzzInputValidation
          - FuzzConcurrentLogging
          - FuzzBufferManagement
          - FuzzMessageEscaping

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version: '1.24'

    - name: Run fuzz test (${{ matrix.fuzz-target }})
      run: go test -fuzz=${{ matrix.fuzz-target }} -fuzztime=120s ./...

    - name: Upload fuzz corpus
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: fuzz-corpus-${{ matrix.fuzz-target }}
        path: testdata/fuzz/
        retention-days: 90
        if-no-files-found: ignore
