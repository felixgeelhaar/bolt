name: Fuzz Testing

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 03:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fuzz-target:
          - FuzzJSONHandler
          - FuzzInputValidation
          - FuzzFloatFormatting
          - FuzzBufferManagement
          - FuzzConcurrentLogging
          - FuzzKeyValidation
          - FuzzUnicodeHandling
          - FuzzMessageEscaping
          - FuzzLevelValidation

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25'

    - name: Run fuzz test (${{ matrix.fuzz-target }})
      run: go test -run=^$ -fuzz=${{ matrix.fuzz-target }} -fuzztime=120s .

    - name: Upload fuzz corpus
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: fuzz-corpus-${{ matrix.fuzz-target }}
        path: testdata/fuzz/
        retention-days: 90
        if-no-files-found: ignore
