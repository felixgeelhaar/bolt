name: Nox Auto-Remediate

# Scheduled vulnerability remediation. Replaces dependabot for the
# security-driven gomod upgrade path. Routine non-security version
# bumps still come from dependabot (github-actions only after this
# change; gomod is owned by nox).
#
# Every weekday morning UTC:
#   1. Scan the project; produce findings.json
#   2. Compute the OSV-driven upgrade plan (`nox fix -dry-run`)
#   3. If there's anything to do: apply (`nox fix`), branch, push, PR
#   4. PR is labelled `security` + `automated`
#
# `-include-major` is OFF by default. Major-version bumps need
# human review and land via a separate ad-hoc dispatch with the
# input toggled on.

on:
  schedule:
    # 04:17 UTC weekdays — off-peak; before the EU work day starts.
    - cron: '17 4 * * 1-5'
  workflow_dispatch:
    inputs:
      include-major:
        description: 'Include cross-major-version upgrades'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  NOX_VERSION: '0.8.1'

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Use a PAT or fine-grained app token if branch protection
          # blocks the default GITHUB_TOKEN from creating PRs that
          # bypass status checks. The default token works for the
          # standard "open PR" path.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nox
        run: |
          set -euo pipefail
          v="${{ env.NOX_VERSION }}"
          url="https://github.com/nox-hq/nox/releases/download/v${v}/nox_${v}_linux_amd64.tar.gz"
          curl -fsSL "$url" -o /tmp/nox.tar.gz
          tar -xzf /tmp/nox.tar.gz -C /tmp
          sudo install -m 0755 /tmp/nox /usr/local/bin/nox

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'

      - name: Scan
        run: nox scan .

      - name: Compute upgrade plan
        id: plan
        run: |
          set -euo pipefail
          MAJOR_FLAG=""
          if [[ "${{ github.event.inputs.include-major }}" == "true" ]]; then
            MAJOR_FLAG="-include-major"
          fi
          # -dry-run prints the plan without mutating files.
          nox fix -dry-run $MAJOR_FLAG -input findings.json -root . > plan.txt 2>&1 || true
          cat plan.txt
          # If the plan is empty, exit early — nothing to do.
          if grep -qE '^[[:space:]]*$' plan.txt && ! grep -q "upgrade" plan.txt; then
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply remediation
        if: steps.plan.outputs.has_plan == 'true'
        run: |
          set -euo pipefail
          MAJOR_FLAG=""
          if [[ "${{ github.event.inputs.include-major }}" == "true" ]]; then
            MAJOR_FLAG="-include-major"
          fi
          nox fix $MAJOR_FLAG -input findings.json -root .
          # Some nox-fix backends rely on `go mod tidy` to finalise.
          go mod tidy
          # Re-scan to confirm the fix landed.
          nox scan . > /dev/null

      - name: Open PR
        if: steps.plan.outputs.has_plan == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            fix(deps): nox-remediate scheduled security upgrade

            Generated by .github/workflows/nox-remediate.yml from the
            output of `nox fix -input findings.json`.

            Plan:
            $(cat plan.txt | head -40)
          branch: nox-remediate/scheduled
          delete-branch: true
          title: 'fix(deps): nox-remediate scheduled security upgrade'
          body: |
            ## Summary

            Automatic security-driven dependency upgrade, generated by the
            [nox-remediate workflow](.github/workflows/nox-remediate.yml)
            from the output of `nox fix -input findings.json`.

            ## Plan

            ```
            $(cat plan.txt)
            ```

            ## Verification

            - [ ] Confirm the change is bound to a real OSV finding
                  (not noise) — see findings.json on the workflow run
            - [ ] CI green (gosec, lint, tests, allocation-check, etc.)
            - [ ] No CHANGELOG entry needed for transitive bumps; add
                  one for direct dependencies

            ## How to retrigger manually

            `gh workflow run nox-remediate.yml -f include-major=false`
          labels: |
            dependencies
            security
            automated
