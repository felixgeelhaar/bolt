# Dependabot is now scoped to GitHub Actions only.
#
# Go-module security upgrades are handled by .github/workflows/nox-remediate.yml
# which runs `nox fix` on a schedule and opens a PR per finding. nox is
# OSV-aware and binds upgrades to the actual vulnerability records, so
# the PRs are smaller and more targeted than dependabot's "always
# upgrade" cadence. Routine non-security gomod bumps are deferred to
# the next time the maintainer touches a module — bolt's hot-path
# deps are thin (only OpenTelemetry transitively).
#
# If you need a routine non-security gomod refresh, run:
#   gh workflow run nox-remediate.yml -f include-major=false
# or open the upgrade PR manually.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - ci
    commit-message:
      prefix: "ci(deps)"
